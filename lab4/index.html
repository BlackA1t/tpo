<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Форма</title>

    <style>
        /* ===== Base ===== */
        * { box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            margin: 0;
            font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
            color: #0f172a;
        }

        /* ===== Layout ===== */
        .page {
            min-height: 100%;
            display: grid;
            place-items: center;
            padding: 28px 16px;
        }

        .card {
            width: 100%;
            max-width: 640px;
            border: 1px solid #e5e7eb;
            border-radius: 18px;
            box-shadow: 0 18px 48px rgba(15, 23, 42, 0.10);
            overflow: hidden;
        }

        .card-header {
            padding: 22px 22px 14px;
            border-bottom: 1px solid #eef2ff;
        }

        h1 {
            margin: 0;
            font-size: 1.55rem;
            letter-spacing: -0.02em;
        }

        .subtitle {
            margin-top: 8px;
            color: #64748b;
            font-size: 0.95rem;
        }

        .card-body {
            padding: 22px;
        }

        /* ===== Form ===== */
        form { margin: 0; }

        .row {
            display: grid;
            gap: 10px;
            margin-bottom: 14px;
        }

        label {
            font-weight: 650;
            color: #334155;
            font-size: 0.95rem;
        }

        input, textarea {
            width: 100%;
            border: 1px solid #e5e7eb;
            background: #f3f3ff;
            border-radius: 14px;
            padding: 12px 12px;
            font-size: 1rem;
            color: #0f172a;
            outline: none;
        }

        textarea {
            min-height: 120px;
            resize: vertical;
        }

        input:focus, textarea:focus {
            border-color: rgba(37, 99, 235, .55);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, .14);
            background: #ffffff;
        }

        .actions {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-top: 8px;
        }

        button {
            border: 0;
            cursor: pointer;
            padding: 12px 16px;
            border-radius: 14px;
            font-weight: 750;
            font-size: 1rem;
            color: #fff;
        }

        button:hover {
            filter: brightness(.98);
            transform: translateY(-1px);
        }

        .hint {
            color: #64748b;
            font-size: 0.92rem;
        }

        /* ===== Messages ===== */
        .error, .success {
            display: none;
            margin: 14px 0 0;
            padding: 12px 12px;
            border-radius: 14px;
            border: 1px solid #e5e7eb;
            background: #fff;
            font-weight: 650;
        }

        .success {
            border-color: #86efac;
            background: #f05df4;
            color: #166534;
        }

        .error {
            border-color: #fca5a5;
            background: #fef3f3;
            color: #991b1b;
        }

        /* Small screens */
        @media (max-width: 520px) {
            .card-header, .card-body { padding: 18px; }
            h1 { font-size: 1.35rem; }
        }
    </style>
</head>

<body>
    <div class="page">
        <div class="card">
            <div class="card-header">
                <h1>Свяжитесь с нами</h1>
                <div class="subtitle">Заполните форму — мы ответим в ближайшее время.</div>
            </div>

            <div class="card-body">
                <form id="contactForm">
                    <div class="row">
                        <label for="name">Имя</label>
                        <input type="text" id="name" name="name" placeholder="Например: Иван Иванов">
                    </div>

                    <div class="row">
                        <label for="email">Email (обязательно)</label>
                        <input type="email" id="email" name="email" placeholder="Например: ivan@example.com">
                    </div>

                    <div class="row">
                        <label for="message">Сообщение</label>
                        <textarea id="message" name="message" placeholder="Напишите, чем мы можем помочь…"></textarea>
                    </div>

                    <div class="actions">
                        <button type="button" id="submitBtn" onclick="submitForm()">Отправить</button>
                        <span class="hint">* Email обязателен для отправки</span>
                    </div>
                </form>

                <p id="successMessage" class="success">Сообщение успешно отправлено!</p>
                <p id="errorMessage" class="error">Ошибка: Поле Email обязательно для заполнения.</p>
            </div>
        </div>
    </div>

    <script>
        function submitForm() {
            const email = document.getElementById('email').value;
            const successMsg = document.getElementById('successMessage');
            const errorMsg = document.getElementById('errorMessage');

            // Сброс
            successMsg.style.display = 'none';
            errorMsg.style.display = 'none';

            if (email === '') {
                errorMsg.style.display = 'block';
            } else {
                successMsg.style.display = 'block';
            }
        }
    </script>
</body>

</html>
