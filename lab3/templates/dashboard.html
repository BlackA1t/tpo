<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <nav class="navbar">
        <div class="container">
            <a href="/" class="logo">MyApp</a>
            <div class="nav-links">
                <span id="user-greeting">Привет, {{ username }}!</span>
                <a href="{{ url_for('logout') }}" id="logout-link" class="btn-logout">Выйти</a>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <div class="dashboard-container">
            <h1 id="dashboard-title">Панель управления</h1>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="alert alert-{{ category }}" id="welcome-message">
                {{ message }}
            </div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <div class="dashboard-content">
                <div class="info-card">
                    <h3>Успешная авторизация</h3>
                    <p>Вы вошли в систему как <strong id="current-user">{{ username }}</strong></p>
                </div>
            </div>
        </div>
        </div>
    </main>
</body>

</html>
